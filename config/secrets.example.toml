# API Keys 配置（复制为 secrets.toml 并填入你的 Key）

[api_keys]
# 主模型 API Key（用于对话和工具调用）
primary = "sk-your-primary-api-key"
# 摘要模型 API Key（可与 primary 相同，或使用更便宜的模型 Key）
summarizer = "sk-your-summarizer-api-key"
# 浏览器 Cloud 模式 API Key（仅 browser.mode = "cloud" 时需要）
# browser_cloud = "your-browser-cloud-api-key"

[admin]
# 管理面板访问密码（留空则无需密码）
password = ""
