# OpenKaguya 默认配置

[llm.primary]
# 主模型：用于生成回复、执行工具调用、执行复杂逻辑
provider = "openai"
base_url = "https://openrouter.ai/api/v1"
model = "moonshotai/kimi-k2.5"
temperature = 0.7
max_tokens = 8192

[llm.secondary]
# 次级模型：用于总结、提取信息等纯文本任务
provider = "openai"
base_url = "https://openrouter.ai/api/v1"
model = "google/gemini-2.5-flash-lite-preview-09-2025"
temperature = 0.3
max_tokens = 8192

[llm.embedding]
# 向量化模型
provider = "openai"
base_url = "https://openrouter.ai/api/v1"
model = "qwen/qwen3-embedding-8b"
dimensions = 4096

[memory]
# 临时记忆：最近 N 条消息
short_term_limit = 10
# 累计多少条未向量化消息后触发向量化
vectorize_threshold = 10
# 日志检索：最近 N 小时
log_hours = 24
# RAG 检索 top-k
retrieval_top_k = 5

[consciousness]
# 主动意识调度
enabled = true
heartbeat_interval_minutes = 30
jitter_seconds = 300
# 静默时段（不主动打扰用户）
quiet_hours_start = "23:00"
quiet_hours_end = "08:00"

[browser]
# 浏览器模式: "local" / "cloud" / "cdp"
mode = "cloud"
chrome_path = ""
cloud_proxy_country = "us"
cdp_url = ""
headless = true

[admin]
# 管理面板
enabled = true
host = "127.0.0.1"
port = 8080

[wechat]
# 微信 Adapter (wechat-v864)
enabled = false
base_url = "http://127.0.0.1:8099"
# 白名单：只处理这些微信 ID / 群的消息
whitelist_users  = []   # 如 ["wxid_alice123", "wxid_bob456"]
whitelist_groups = []   # 如 ["12345678@chatroom"]

# ===== 跨平台用户身份注册表 =====
# 每个 [[identity.users]] 定义辉夜姬认识的一个人
# accounts 格式: "平台:原始ID"（如 "wechat:wxid_xxx", "qq:12345"）

# [[identity.users]]
# id       = "alice"
# nickname = "小爱"
# note     = "喜欢猫和咖啡，CS 专业大三"
# role     = "admin"    # admin / friend / acquaintance
# accounts = ["wechat:wxid_alice123", "qq:12345678", "cli:local_user"]
