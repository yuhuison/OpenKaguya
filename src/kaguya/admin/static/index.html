<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 OpenKaguya Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==================== Reset & Base ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0b1120;
  --bg-secondary: #111827;
  --bg-card: #1a2332;
  --bg-card-hover: #1f2b3d;
  --bg-input: #0f1923;
  --border: #2a3544;
  --text-primary: #e8ecf1;
  --text-secondary: #8899aa;
  --text-muted: #5a6a7a;
  --accent-purple: #8b5cf6;
  --accent-blue: #3b82f6;
  --accent-teal: #14b8a6;
  --accent-pink: #ec4899;
  --accent-amber: #f59e0b;
  --accent-green: #22c55e;
  --gradient-purple: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
  --gradient-blue: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
  --gradient-teal: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%);
  --gradient-pink: linear-gradient(135deg, #db2777 0%, #ec4899 100%);
  --gradient-amber: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
  --gradient-green: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: all 0.2s ease;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
}

/* ==================== Sidebar ==================== */
.sidebar {
  width: 220px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar-header p {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.nav-items {
  padding: 12px 8px;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  margin-bottom: 2px;
}

.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-item.active { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; }

/* ==================== Main ==================== */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 28px 32px;
  min-height: 100vh;
}

.page { display: none; }
.page.active { display: block; }

.page-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
}

/* ==================== Stats Cards ==================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  padding: 20px;
  border-radius: var(--radius);
  color: white;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.stat-card .label {
  font-size: 12px;
  opacity: 0.85;
  margin-bottom: 8px;
  font-weight: 500;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 700;
}
.stat-card:nth-child(1) { background: var(--gradient-purple); }
.stat-card:nth-child(2) { background: var(--gradient-blue); }
.stat-card:nth-child(3) { background: var(--gradient-teal); }
.stat-card:nth-child(4) { background: var(--gradient-pink); }
.stat-card:nth-child(5) { background: var(--gradient-amber); }
.stat-card:nth-child(6) { background: var(--gradient-green); }

/* ==================== Section Card ==================== */
.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}

/* ==================== Split Layout ==================== */
.split-layout {
  display: flex;
  gap: 20px;
  height: calc(100vh - 120px);
}
.split-left {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-y: auto;
}
.split-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

/* ==================== List Items ==================== */
.list-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
}
.list-item:hover { background: var(--bg-card-hover); }
.list-item.active { background: rgba(139,92,246,0.1); border-left: 3px solid var(--accent-purple); }
.list-item .item-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.list-item .item-meta {
  font-size: 12px;
  color: var(--text-muted);
}

/* ==================== Messages ==================== */
.message-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.msg {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  max-width: 85%;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}
.msg.user {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.2);
  align-self: flex-end;
}
.msg.assistant {
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.2);
  align-self: flex-start;
}
.msg.tool {
  background: rgba(20,184,166,0.1);
  border: 1px solid rgba(20,184,166,0.2);
  align-self: flex-start;
  font-family: 'Consolas', 'Fira Code', monospace;
  font-size: 12px;
}
.msg .msg-role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 4px;
  opacity: 0.7;
}
.msg .msg-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ==================== Topics ==================== */
.topic-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.topic-card:hover { border-color: var(--accent-purple); }
.topic-card .topic-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}
.topic-card .topic-meta {
  font-size: 12px;
  color: var(--text-muted);
}
.topic-card .topic-summary {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 10px;
  line-height: 1.6;
  white-space: pre-wrap;
  display: none;
}
.topic-card.expanded .topic-summary { display: block; }

/* ==================== Config Editor ==================== */
.config-textarea {
  width: 100%;
  min-height: 500px;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-family: 'Consolas', 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  tab-size: 4;
}
.config-textarea:focus { border-color: var(--accent-purple); }

.btn {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary {
  background: var(--gradient-purple);
  color: white;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { color: var(--text-primary); border-color: var(--text-muted); }

.save-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.save-status {
  font-size: 13px;
  color: var(--accent-green);
  opacity: 0;
  transition: var(--transition);
}
.save-status.show { opacity: 1; }

/* ==================== Log Viewer ==================== */
.log-content {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-family: 'Consolas', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
  overflow-y: auto;
  max-height: calc(100vh - 200px);
  white-space: pre;
  word-break: break-all;
}

/* ==================== Consciousness Log ==================== */
.clog-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.clog-item:last-child { border-bottom: none; }
.clog-time {
  font-size: 12px;
  color: var(--accent-purple);
  font-weight: 500;
  margin-bottom: 4px;
}
.clog-summary {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.clog-targets {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ==================== Empty State ==================== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 14px;
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

/* ==================== Loading ==================== */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-muted);
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent-purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ==================== Scrollbar ==================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>🌙 OpenKaguya</h1>
    <p>管理面板</p>
  </div>
  <div class="nav-items">
    <div class="nav-item active" data-page="dashboard">
      <span class="icon">📊</span> 仪表盘
    </div>
    <div class="nav-item" data-page="messages">
      <span class="icon">💬</span> 对话 & 记忆
    </div>
    <div class="nav-item" data-page="config">
      <span class="icon">⚙️</span> 配置编辑
    </div>
    <div class="nav-item" data-page="logs">
      <span class="icon">📋</span> 日志
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Dashboard -->
  <div id="page-dashboard" class="page active">
    <h2 class="page-title">仪表盘</h2>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-card">
      <h3>🧠 最近意识活动</h3>
      <div id="consciousness-logs"></div>
    </div>
  </div>

  <!-- Messages & Memory -->
  <div id="page-messages" class="page">
    <h2 class="page-title">对话 & 记忆</h2>
    <div class="split-layout">
      <div class="split-left" id="user-list"></div>
      <div class="split-right">
        <div class="section-card" style="flex:1;overflow-y:auto">
          <h3>💬 消息记录</h3>
          <div id="message-list" class="message-list">
            <div class="empty-state"><div class="icon">👈</div>选择一个用户查看消息</div>
          </div>
        </div>
        <div class="section-card" style="max-height:40%;">
          <h3>📚 话题摘要</h3>
          <div id="topic-list">
            <div class="empty-state">选择用户后显示话题</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Config -->
  <div id="page-config" class="page">
    <h2 class="page-title">配置编辑</h2>
    <div class="split-layout">
      <div class="split-left" id="config-file-list"></div>
      <div class="split-right">
        <div class="save-bar">
          <span id="config-filename" style="font-weight:600;color:var(--text-secondary);">选择配置文件</span>
          <div style="display:flex;gap:10px;align-items:center;">
            <span id="save-status" class="save-status">✅ 已保存</span>
            <button class="btn btn-primary" id="btn-save-config" onclick="saveConfig()">保存</button>
          </div>
        </div>
        <textarea class="config-textarea" id="config-editor" placeholder="选择左侧文件进行编辑..."></textarea>
      </div>
    </div>
  </div>

  <!-- Logs -->
  <div id="page-logs" class="page">
    <h2 class="page-title">日志</h2>
    <div class="split-layout">
      <div class="split-left" id="log-file-list"></div>
      <div class="split-right">
        <div class="save-bar">
          <span id="log-filename" style="font-weight:600;color:var(--text-secondary);">选择日志文件</span>
          <button class="btn btn-secondary" onclick="refreshLog()">🔄 刷新</button>
        </div>
        <div class="log-content" id="log-content">选择左侧日志文件查看...</div>
      </div>
    </div>
  </div>

</div>

<script>
// ==================== State ====================
let currentPage = 'dashboard';
let currentUserId = '';
let currentConfigFile = '';
let currentLogFile = '';
let configData = {};

// ==================== API ====================
async function api(path) {
  const res = await fetch(path);
  return res.json();
}

async function apiPut(path, body) {
  const res = await fetch(path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ==================== Navigation ====================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelector('.nav-item.active')?.classList.remove('active');
    item.classList.add('active');
    const page = item.dataset.page;
    document.querySelector('.page.active')?.classList.remove('active');
    document.getElementById('page-' + page).classList.add('active');
    currentPage = page;
    if (page === 'dashboard') loadDashboard();
    if (page === 'messages') loadUsers();
    if (page === 'config') loadConfig();
    if (page === 'logs') loadLogFiles();
  });
});

// ==================== Dashboard ====================
async function loadDashboard() {
  const stats = await api('/api/stats');
  const grid = document.getElementById('stats-grid');
  const items = [
    { label: '总消息', value: stats.total_messages, icon: '💬' },
    { label: '话题数', value: stats.total_topics, icon: '📚' },
    { label: '用户数', value: stats.total_users, icon: '👥' },
    { label: '今日消息', value: stats.today_messages, icon: '📨' },
    { label: '笔记', value: stats.total_notes, icon: '📝' },
    { label: '活跃定时器', value: stats.active_timers, icon: '⏰' },
  ];
  grid.innerHTML = items.map(i => `
    <div class="stat-card">
      <div class="label">${i.icon} ${i.label}</div>
      <div class="value">${i.value}</div>
    </div>
  `).join('');

  // Consciousness logs
  const logs = await api('/api/consciousness-logs?limit=10');
  const el = document.getElementById('consciousness-logs');
  if (!logs.length) {
    el.innerHTML = '<div class="empty-state">暂无意识活动记录</div>';
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="clog-item">
      <div class="clog-time">${l.created_at || ''}</div>
      <div class="clog-summary">${escHtml(l.summary)}</div>
      ${l.target_users ? `<div class="clog-targets">👤 ${escHtml(l.target_users)}</div>` : ''}
    </div>
  `).join('');
}

// ==================== Messages ====================
async function loadUsers() {
  const users = await api('/api/users');
  const el = document.getElementById('user-list');
  if (!users.length) {
    el.innerHTML = '<div class="empty-state">暂无用户数据</div>';
    return;
  }
  el.innerHTML = users.map(u => `
    <div class="list-item ${u.user_id === currentUserId ? 'active' : ''}"
         onclick="selectUser('${escAttr(u.user_id)}')">
      <div class="item-title">👤 ${escHtml(u.user_id)}</div>
      <div class="item-meta">${u.platform} · ${u.msg_count} 条 · ${formatTime(u.last_active)}</div>
    </div>
  `).join('');
}

async function selectUser(userId) {
  currentUserId = userId;
  loadUsers(); // refresh active state
  loadMessages(userId);
  loadTopics(userId);
}

async function loadMessages(userId) {
  const el = document.getElementById('message-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  const msgs = await api(`/api/messages?user_id=${encodeURIComponent(userId)}&limit=100`);
  if (!msgs.length) {
    el.innerHTML = '<div class="empty-state">暂无消息</div>';
    return;
  }
  // Reverse to show oldest first
  msgs.reverse();
  el.innerHTML = msgs.map(m => {
    const display = m.display_content || m.content || '';
    const roleClass = m.role === 'user' ? 'user' : (m.role === 'tool' ? 'tool' : 'assistant');
    const roleLabel = m.role === 'user' ? '用户' : (m.role === 'tool' ? '工具' : '辉夜姬');
    return `
      <div class="msg ${roleClass}">
        <div class="msg-role">${roleLabel}</div>
        ${escHtml(display.substring(0, 500))}${display.length > 500 ? '...' : ''}
        <div class="msg-time">${formatTime(m.created_at)}</div>
      </div>
    `;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function loadTopics(userId) {
  const el = document.getElementById('topic-list');
  const topics = await api(`/api/topics?user_id=${encodeURIComponent(userId)}`);
  if (!topics.length) {
    el.innerHTML = '<div class="empty-state">暂无话题</div>';
    return;
  }
  el.innerHTML = topics.map(t => `
    <div class="topic-card" onclick="toggleTopic(this, '${escAttr(t.id)}')">
      <div class="topic-title">📖 ${escHtml(t.title)}</div>
      <div class="topic-meta">${t.message_count} 条消息 · ${formatTime(t.updated_at)}</div>
      <div class="topic-summary" id="topic-${t.id}">加载中...</div>
    </div>
  `).join('');
}

async function toggleTopic(el, topicId) {
  el.classList.toggle('expanded');
  const summaryEl = document.getElementById('topic-' + topicId);
  if (el.classList.contains('expanded') && summaryEl.textContent === '加载中...') {
    const topic = await api(`/api/topics/${topicId}`);
    summaryEl.textContent = topic.summary || '(无摘要)';
  }
}

// ==================== Config ====================
async function loadConfig() {
  configData = await api('/api/config');
  const el = document.getElementById('config-file-list');
  const files = Object.keys(configData);
  el.innerHTML = files.map(f => `
    <div class="list-item ${f === currentConfigFile ? 'active' : ''}"
         onclick="selectConfigFile('${escAttr(f)}')">
      <div class="item-title">📄 ${f}</div>
    </div>
  `).join('');
  if (!currentConfigFile && files.length) selectConfigFile(files[0]);
}

function selectConfigFile(filename) {
  currentConfigFile = filename;
  document.getElementById('config-filename').textContent = filename;
  document.getElementById('config-editor').value = configData[filename] || '';
  loadConfig(); // refresh active state
}

async function saveConfig() {
  if (!currentConfigFile) return;
  const content = document.getElementById('config-editor').value;
  try {
    const result = await apiPut(`/api/config/${currentConfigFile}`, { content });
    const statusEl = document.getElementById('save-status');
    if (result.ok) {
      statusEl.textContent = '✅ 已保存';
      statusEl.style.color = 'var(--accent-green)';
    } else {
      statusEl.textContent = '❌ ' + (result.error || '保存失败');
      statusEl.style.color = 'var(--accent-pink)';
    }
    statusEl.classList.add('show');
    setTimeout(() => statusEl.classList.remove('show'), 3000);
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

// ==================== Logs ====================
async function loadLogFiles() {
  const files = await api('/api/logs');
  const el = document.getElementById('log-file-list');
  if (!files.length) {
    el.innerHTML = '<div class="empty-state">暂无日志文件</div>';
    return;
  }
  el.innerHTML = files.map(f => `
    <div class="list-item ${f === currentLogFile ? 'active' : ''}"
         onclick="selectLogFile('${escAttr(f)}')">
      <div class="item-title">📋 ${f}</div>
    </div>
  `).join('');
  if (!currentLogFile) selectLogFile(files[0]);
}

async function selectLogFile(filename) {
  currentLogFile = filename;
  document.getElementById('log-filename').textContent = filename;
  loadLogFiles(); // refresh active state
  await refreshLog();
}

async function refreshLog() {
  if (!currentLogFile) return;
  const el = document.getElementById('log-content');
  el.textContent = '加载中...';
  const data = await api(`/api/logs/${currentLogFile}?lines=500`);
  if (data.error) {
    el.textContent = '错误: ' + data.error;
    return;
  }
  el.textContent = data.lines.join('\n');
  el.scrollTop = el.scrollHeight;
}

// ==================== Helpers ====================
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.replace(' ', 'T') + (ts.includes('+') ? '' : 'Z'));
    return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return ts; }
}

// ==================== Init ====================
loadDashboard();
</script>
